<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coding Agent - Log Viewer</title>
  <link rel="stylesheet" href="https://unpkg.com/@mantine/core@8.3.16/styles.css" />
  <style>
    html,
    body,
    #root {
      height: 100%;
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime"
      }
    }
  </script>

  <script type="module">
    import React, { useCallback, useEffect, useMemo, useState } from "react";
    import { createRoot } from "react-dom/client";
    import * as Mantine from "https://esm.sh/@mantine/core@8.3.16?bundle&external=react,react-dom,react-dom/client";
    import htm from "https://esm.sh/htm@3.1.1";

    const html = htm.bind(React.createElement);
    const {
      AppShell,
      Badge,
      Burger,
      Button,
      Group,
      Loader,
      MantineProvider,
      Modal,
      Paper,
      PasswordInput,
      ScrollArea,
      Stack,
      Switch,
      Table,
      Text,
      TextInput,
      Title,
    } = Mantine;

    const LEVEL_OPTIONS = [
      { value: "", label: "All levels" },
      { value: "info", label: "Info" },
      { value: "warn", label: "Warning" },
      { value: "error", label: "Error" },
    ];

    function normalizeFileName(entry) {
      if (typeof entry === "string") return entry;
      if (entry && typeof entry.file === "string") return entry.file;
      return "";
    }

    function formatTimestamp(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString();
    }

    function levelBadgeColor(level) {
      const normalized = String(level || "").toLowerCase();
      if (normalized === "error") return "red";
      if (normalized === "warn") return "yellow";
      return "blue";
    }

    class HttpError extends Error {
      constructor(message, status) {
        super(message);
        this.name = "HttpError";
        this.status = status;
      }
    }

    async function fetchJson(url, token) {
      const headers = token ? { Authorization: `Bearer ${token}` } : {};
      const response = await fetch(url, { headers });

      if (response.status === 401) {
        throw new HttpError("Unauthorized", 401);
      }

      if (!response.ok) {
        let message = `${response.status} ${response.statusText}`;
        try {
          const payload = await response.json();
          if (payload && typeof payload.error === "string") {
            message = payload.error;
          }
        } catch (_error) {
          // Keep fallback message.
        }
        throw new HttpError(message, response.status);
      }

      return response.json();
    }

    function App() {
      const [level, setLevel] = useState("");
      const [file, setFile] = useState("");
      const [searchInput, setSearchInput] = useState("");
      const [search, setSearch] = useState("");
      const [page, setPage] = useState(1);
      const [files, setFiles] = useState([]);
      const [logs, setLogs] = useState([]);
      const [totalPages, setTotalPages] = useState(1);
      const [totalLogs, setTotalLogs] = useState(0);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [autoRefresh, setAutoRefresh] = useState(true);
      const [token, setToken] = useState(localStorage.getItem("logViewerToken") || "");
      const [authOpen, setAuthOpen] = useState(false);
      const [authDraft, setAuthDraft] = useState(token);
      const [mobileNavOpen, setMobileNavOpen] = useState(false);
      const limit = 50;

      const fileNames = useMemo(
        () => files.map((entry) => normalizeFileName(entry)).filter(Boolean),
        [files]
      );

      const openAuthModal = useCallback(() => {
        setAuthDraft(token);
        setAuthOpen(true);
      }, [token]);

      const loadFiles = useCallback(async () => {
        try {
          const payload = await fetchJson("/api/files", token);
          setFiles(Array.isArray(payload.files) ? payload.files : []);
        } catch (fetchError) {
          if (fetchError instanceof HttpError && fetchError.status === 401) {
            openAuthModal();
            return;
          }
          setFiles([]);
        }
      }, [openAuthModal, token]);

      const loadLogs = useCallback(async () => {
        setLoading(true);
        setError("");

        const params = new URLSearchParams({
          page: String(page),
          limit: String(limit),
        });
        if (level) params.set("level", level);
        if (file) params.set("file", file);
        if (search) params.set("search", search);

        try {
          const payload = await fetchJson(`/api/logs?${params.toString()}`, token);
          const nextLogs = Array.isArray(payload.logs) ? payload.logs : [];
          const nextFiles = Array.isArray(payload.files) ? payload.files : [];
          const nextTotalPages = Number(payload.totalPages) > 0 ? Number(payload.totalPages) : 1;
          const nextPage = Number(payload.currentPage) > 0 ? Number(payload.currentPage) : 1;

          setLogs(nextLogs);
          setFiles(nextFiles);
          setTotalPages(nextTotalPages);
          setTotalLogs(Number(payload.totalLogs) || 0);
          setPage(nextPage);
        } catch (fetchError) {
          if (fetchError instanceof HttpError && fetchError.status === 401) {
            openAuthModal();
            return;
          }

          setLogs([]);
          setTotalPages(1);
          setTotalLogs(0);
          setPage(1);
          setError(fetchError instanceof Error ? fetchError.message : "Failed to load logs");
        } finally {
          setLoading(false);
        }
      }, [file, level, openAuthModal, page, search, token]);

      useEffect(() => {
        const timer = setTimeout(() => {
          setSearch(searchInput.trim());
        }, 300);
        return () => clearTimeout(timer);
      }, [searchInput]);

      useEffect(() => {
        void loadFiles();
      }, [loadFiles]);

      useEffect(() => {
        void loadLogs();
      }, [loadLogs]);

      useEffect(() => {
        if (!autoRefresh) return undefined;
        const timer = setInterval(() => {
          void loadLogs();
        }, 5000);
        return () => clearInterval(timer);
      }, [autoRefresh, loadLogs]);

      const clearFilters = () => {
        setLevel("");
        setFile("");
        setSearchInput("");
        setSearch("");
        setPage(1);
      };

      const saveToken = () => {
        const nextToken = authDraft.trim();
        setToken(nextToken);
        if (nextToken) {
          localStorage.setItem("logViewerToken", nextToken);
        } else {
          localStorage.removeItem("logViewerToken");
        }
        setAuthOpen(false);
      };

      const rows = logs.map((entry, index) =>
        html`
          <${Table.Tr} key=${`${entry.timestamp || "no-ts"}-${index}`}>
            <${Table.Td}>
              <${Badge} color=${levelBadgeColor(entry.level)} variant="light">
                ${entry.level || "INFO"}
              </${Badge}>
            </${Table.Td}>
            <${Table.Td}>
              <${Text} size="sm" style=${{ whiteSpace: "pre-wrap", fontFamily: "monospace" }}>
                ${entry.message || ""}
              </${Text}>
            </${Table.Td}>
            <${Table.Td}>
              <${Text} size="sm" c="dimmed">
                ${entry.service || "-"}
              </${Text}>
            </${Table.Td}>
            <${Table.Td}>
              <${Text} size="sm" c="dimmed" ta="right">
                ${formatTimestamp(entry.timestamp)}
              </${Text}>
            </${Table.Td}>
          </${Table.Tr}>
        `
      );

      return html`
        <${MantineProvider} defaultColorScheme="light">
          <${AppShell}
            header=${{ height: 56 }}
            navbar=${{ width: 260, breakpoint: "sm", collapsed: { mobile: !mobileNavOpen } }}
          >
            <${AppShell.Header}>
              <${Group} h="100%" px="md" justify="space-between">
                <${Group} gap="sm">
                  <${Burger}
                    opened=${mobileNavOpen}
                    onClick=${() => setMobileNavOpen((open) => !open)}
                    hiddenFrom="sm"
                    size="sm"
                  />
                  <${Title} order=${4}>Log Viewer</${Title}>
                </${Group}>
                <${Text} size="sm" c="dimmed">${totalLogs} logs</${Text}>
              </${Group}>
            </${AppShell.Header}>

            <${AppShell.Navbar} p="md">
              <${Stack} h="100%" gap="md">
                <${Stack} gap="xs">
                  <${Text} fw=${600} size="sm">Level</${Text}>
                  ${LEVEL_OPTIONS.map(
                    (option) => html`
                      <${Button}
                        key=${option.value || "all-levels"}
                        variant=${level === option.value ? "filled" : "light"}
                        justify="flex-start"
                        onClick=${() => {
                          setLevel(option.value);
                          setPage(1);
                          setMobileNavOpen(false);
                        }}
                      >
                        ${option.label}
                      </${Button}>
                    `
                  )}
                </${Stack}>

                <${Stack} gap="xs" style=${{ flex: "1 1 auto", minHeight: 0 }}>
                  <${Text} fw=${600} size="sm">Files</${Text}>
                  <${ScrollArea} h="100%">
                    <${Stack} gap="xs" pr="xs">
                      <${Button}
                        variant=${file === "" ? "filled" : "light"}
                        justify="flex-start"
                        onClick=${() => {
                          setFile("");
                          setPage(1);
                          setMobileNavOpen(false);
                        }}
                      >
                        All files
                      </${Button}>
                      ${fileNames.map(
                        (name) => html`
                          <${Button}
                            key=${name}
                            variant=${file === name ? "filled" : "light"}
                            justify="flex-start"
                            onClick=${() => {
                              setFile(name);
                              setPage(1);
                              setMobileNavOpen(false);
                            }}
                          >
                            ${name}
                          </${Button}>
                        `
                      )}
                    </${Stack}>
                  </${ScrollArea}>
                </${Stack}>
              </${Stack}>
            </${AppShell.Navbar}>

            <${AppShell.Main}>
              <${Stack} p="md" gap="md">
                <${Group} align="center" wrap="wrap">
                  <${TextInput}
                    placeholder="Search in logs"
                    aria-label="Search in logs"
                    value=${searchInput}
                    onChange=${(event) => {
                      setSearchInput(event.currentTarget.value);
                      setPage(1);
                    }}
                    style=${{ flex: "1 1 320px" }}
                  />
                  <${Switch}
                    label="Auto refresh"
                    checked=${autoRefresh}
                    onChange=${(event) => setAutoRefresh(event.currentTarget.checked)}
                    style=${{ alignSelf: "center" }}
                  />
                  <${Button} color="red" variant="light" onClick=${clearFilters} style=${{ alignSelf: "center" }}>
                    Clear filters
                  </${Button}>
                </${Group}>

                <${Paper} withBorder radius="md">
                  <${ScrollArea} type="auto">
                    <${Table} striped highlightOnHover withTableBorder withColumnBorders>
                      <${Table.Thead}>
                        <${Table.Tr}>
                          <${Table.Th}>Level</${Table.Th}>
                          <${Table.Th}>Message</${Table.Th}>
                          <${Table.Th}>Service</${Table.Th}>
                          <${Table.Th} ta="right">Timestamp</${Table.Th}>
                        </${Table.Tr}>
                      </${Table.Thead}>
                      <${Table.Tbody}>
                        ${loading &&
                        logs.length === 0 &&
                        html`
                          <${Table.Tr}>
                            <${Table.Td} colSpan=${4}>
                              <${Group} justify="center" py="md">
                                <${Loader} size="sm" />
                              </${Group}>
                            </${Table.Td}>
                          </${Table.Tr}>
                        `}
                        ${!loading &&
                        error &&
                        html`
                          <${Table.Tr}>
                            <${Table.Td} colSpan=${4}>
                              <${Text} c="red" ta="center" py="md">${error}</${Text}>
                            </${Table.Td}>
                          </${Table.Tr}>
                        `}
                        ${!loading &&
                        !error &&
                        logs.length === 0 &&
                        html`
                          <${Table.Tr}>
                            <${Table.Td} colSpan=${4}>
                              <${Text} c="dimmed" ta="center" py="md">No logs found.</${Text}>
                            </${Table.Td}>
                          </${Table.Tr}>
                        `}
                        ${!error && rows}
                      </${Table.Tbody}>
                    </${Table}>
                  </${ScrollArea}>
                </${Paper}>

                <${Group} justify="space-between">
                  <${Text} size="sm" c="dimmed">Page ${page} of ${totalPages}</${Text}>
                  <${Group} gap="xs">
                    <${Button}
                      variant="default"
                      disabled=${page <= 1}
                      onClick=${() => setPage((current) => Math.max(1, current - 1))}
                    >
                      Previous
                    </${Button}>
                    <${Button}
                      variant="default"
                      disabled=${page >= totalPages}
                      onClick=${() => setPage((current) => Math.min(totalPages, current + 1))}
                    >
                      Next
                    </${Button}>
                  </${Group}>
                </${Group}>
              </${Stack}>
            </${AppShell.Main}>
          </${AppShell}>

          <${Modal}
            opened=${authOpen}
            onClose=${() => setAuthOpen(false)}
            title="Authentication required"
            centered
          >
            <${Stack}>
              <${Text} size="sm" c="dimmed">
                Provide the configured token to read logs.
              </${Text}>
              <${PasswordInput}
                placeholder="Bearer token"
                value=${authDraft}
                onChange=${(event) => setAuthDraft(event.currentTarget.value)}
                onKeyDown=${(event) => {
                  if (event.key === "Enter") {
                    event.preventDefault();
                    saveToken();
                  }
                }}
              />
              <${Group} justify="flex-end">
                <${Button} variant="default" onClick=${() => setAuthOpen(false)}>Cancel</${Button}>
                <${Button} onClick=${saveToken}>Save token</${Button}>
              </${Group}>
            </${Stack}>
          </${Modal}>
        </${MantineProvider}>
      `;
    }

    const root = createRoot(document.getElementById("root"));
    root.render(html`<${App} />`);
  </script>
</body>
</html>
